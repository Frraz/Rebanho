name: 🚀 Deploy — Gestão de Rebanhos

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo do deploy manual"
        required: false
        default: "Deploy manual"

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  PROJECT_DIR: /var/www/docker-instances/Rebanho
  STATICFILES_DIR: /var/www/docker-instances/Rebanho/staticfiles
  CONTAINER_UID: "100"
  CONTAINER_GID: "101"

jobs:
  deploy:
    name: 🚀 Deploy para VPS
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 📋 Informações do deploy
        run: |
          echo "Repositório : ${{ github.repository }}"
          echo "Branch      : ${{ github.ref_name }}"
          echo "Commit      : ${{ github.sha }}"
          echo "Autor       : ${{ github.actor }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Motivo      : ${{ github.event.inputs.reason }}"
          else
            echo "Mensagem    : ${{ github.event.head_commit.message }}"
          fi

      - name: 🔄 Atualizar código e rebuild na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 30s
          command_timeout: 16m
          script_stop: true
          script: |
            set -euo pipefail

            PROJECT_DIR="${{ env.PROJECT_DIR }}"
            STATICFILES_DIR="${{ env.STATICFILES_DIR }}"
            CONTAINER_UID="${{ env.CONTAINER_UID }}"
            CONTAINER_GID="${{ env.CONTAINER_GID }}"
            COMPOSE="docker compose -f $PROJECT_DIR/docker-compose.yml --env-file $PROJECT_DIR/.env.prod"

            cd "$PROJECT_DIR"

            echo "[1/9] Atualizando código..."
            git fetch origin main
            git reset --hard origin/main
            echo "Commit: $(git log -1 --oneline)"

            echo "[2/9] Garantindo diretórios..."
            mkdir -p "$STATICFILES_DIR"

            echo "[3/9] Corrigindo permissões de staticfiles..."
            sudo chown -R "${CONTAINER_UID}:${CONTAINER_GID}" "$STATICFILES_DIR"

            echo "[4/9] Build da imagem web..."
            $COMPOSE build web

            echo "[5/9] Subindo web..."
            $COMPOSE up -d --no-deps --remove-orphans web

            echo "[6/9] Aplicando migrações..."
            $COMPOSE run --rm web python manage.py migrate --noinput

            echo "[7/9] Verificando se existem mudanças de model sem migration..."
            # Falha o deploy se ainda houver mudanças sem migration
            $COMPOSE run --rm web python manage.py makemigrations --check --dry-run

            echo "[8/9] Limpando staticfiles órfãos e coletando estáticos..."
            $COMPOSE run --rm web sh -lc "rm -rf /app/staticfiles/* && python manage.py collectstatic --noinput"

            echo "[9/9] Reiniciando celery..."
            $COMPOSE restart celery

            echo "Limpando imagens antigas..."
            docker image prune -f

            echo "Deploy concluído: $(git log -1 --oneline)"

      - name: 🏥 Health check da aplicação
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 30s
          command_timeout: 8m
          script_stop: true
          script: |
            set -euo pipefail

            PROJECT_DIR="${{ env.PROJECT_DIR }}"
            COMPOSE="docker compose -f $PROJECT_DIR/docker-compose.yml --env-file $PROJECT_DIR/.env.prod"

            echo "Aguardando container estabilizar..."
            sleep 15

            STATE=$(docker inspect --format='{{.State.Status}}' rebanho_web 2>/dev/null || echo "not_found")
            echo "Estado do web: $STATE"

            if [ "$STATE" = "exited" ] || [ "$STATE" = "dead" ] || [ "$STATE" = "restarting" ] || [ "$STATE" = "not_found" ]; then
              echo "ERRO — Container web não saudável (state=$STATE)"
              echo "Status:"
              $COMPOSE ps
              echo "Logs do web:"
              $COMPOSE logs --tail=200 web
              exit 1
            fi

            echo "Status dos containers:"
            $COMPOSE ps

            echo "Testando HTTP na porta 8080..."
            RETRIES=10
            COUNT=0
            HTTP_OK=0

            while [ $COUNT -lt $RETRIES ]; do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://127.0.0.1:8080/login/ 2>/dev/null || true)
              CODE="${CODE:-000}"
              echo "  Tentativa $((COUNT+1))/$RETRIES — HTTP $CODE"

              if [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ]; then
                HTTP_OK=1
                break
              fi

              COUNT=$((COUNT + 1))
              [ $COUNT -lt $RETRIES ] && sleep 8
            done

            if [ $HTTP_OK -eq 1 ]; then
              echo "OK — aplicação respondendo HTTP $CODE"
            else
              echo "FALHOU — aplicação não respondeu após $RETRIES tentativas"
              echo "Status:"
              $COMPOSE ps
              echo "Logs do web:"
              $COMPOSE logs --tail=200 web
              exit 1
            fi

      - name: ✅ Sucesso
        if: success()
        run: |
          echo "DEPLOY CONCLUÍDO COM SUCESSO"
          echo "Commit : ${{ github.sha }}"
          echo "Autor  : ${{ github.actor }}"
          echo "URL    : https://rebanho.ferzion.com.br"

      - name: ❌ Falha
        if: failure()
        run: |
          echo "DEPLOY FALHOU"
          echo "Commit : ${{ github.sha }}"
          echo "Autor  : ${{ github.actor }}"
          exit 1