{% extends 'base/base.html' %}

{% block title %}Ficha de Controle Manual{% endblock %}

{% block content %}
<div class="space-y-8">

    <!-- Header -->
    <div>
        <h1 class="text-3xl font-bold text-gray-900">Ficha de Controle Manual</h1>
        <p class="mt-2 text-gray-600">Gere a ficha para impressão e preenchimento manuscrito no campo</p>
    </div>

    <!-- Card centralizado -->
    <div class="flex justify-center">
        <div class="w-full max-w-2xl bg-white shadow-sm rounded-xl border border-gray-200 hover:shadow-md transition-shadow">
            <div class="px-6 py-6">

                <div class="flex items-start justify-between mb-4">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
                            <svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            Ficha de Controle Manual
                        </h3>
                        <p class="text-sm text-gray-500 mt-1">
                            PDF para impressão e preenchimento à mão
                        </p>
                    </div>
                </div>

                <form method="get" action="{% url 'reporting:manual_control_pdf' %}" target="_blank" class="space-y-4">

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            Fazenda <span class="text-red-500">*</span>
                        </label>
                        <select name="farm" required
                                class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 sm:text-sm">
                            <option value="">Selecione uma fazenda</option>
                            {% for farm in farms %}
                            <option value="{{ farm.id }}">{{ farm.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Mês</label>
                            <select name="month"
                                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 sm:text-sm">
                                {% for num, nome in months %}
                                <option value="{{ num }}" {% if num == default_month %}selected{% endif %}>{{ nome }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Ano</label>
                            <select name="year"
                                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 sm:text-sm">
                                {% for y in years %}
                                <option value="{{ y }}" {% if y == default_year %}selected{% endif %}>{{ y }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <button type="submit"
                            class="w-full flex items-center justify-center gap-2 px-4 py-2.5 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-orange-600 hover:bg-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition-colors">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                        </svg>
                        Gerar Ficha para Impressão
                    </button>
                </form>
            </div>
        </div>
    </div>

</div>
{% endblock %}
