<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>{% block title %}Relatório{% endblock %}</title>
<style>
  /* ══════════════════════════════════════════════════════════════
     ESTILO PLANILHA EXCEL — Reproduz fielmente o layout original
  ══════════════════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 9pt;
    color: #000;
    background: #fff;
    line-height: 1.3;
  }

  @page {
    size: A4 landscape;
    margin: 0.8cm 1cm;
  }

  #page-wrapper { width: 100%; }

  /* ── Cabeçalho ───────────────────────────────────────────── */
  .report-header {
    margin-bottom: 8px;
  }
  .report-header-row {
    display: table;
    width: 100%;
  }
  .report-header-left {
    display: table-cell;
    text-align: left;
    vertical-align: top;
  }
  .report-header-right {
    display: table-cell;
    text-align: right;
    vertical-align: top;
  }
  .report-title {
    font-size: 11pt;
    font-weight: bold;
    text-transform: uppercase;
  }
  .report-subtitle {
    font-size: 10pt;
    font-weight: bold;
  }
  .report-period {
    font-size: 10pt;
    font-weight: bold;
  }

  /* ── Tabelas estilo Excel ────────────────────────────────── */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 8pt;
  }

  th, td {
    border: 1px solid #000;
    padding: 2px 4px;
    text-align: center;
    vertical-align: middle;
  }

  th {
    font-weight: bold;
    font-size: 7.5pt;
    text-transform: uppercase;
    background: #fff;
  }

  td.text-left, th.text-left {
    text-align: left;
  }
  td.text-right, th.text-right {
    text-align: right;
  }

  /* ── Fundo amarelo para título de período ────────────────── */
  .period-header {
    background: #FFD700 !important;
    font-weight: bold;
    font-size: 9pt;
    text-align: center;
    padding: 3px 5px;
    border: 1px solid #000;
  }

  /* ── Linha de totais ─────────────────────────────────────── */
  tr.total-row td {
    font-weight: bold;
    border-top: 2px solid #000;
  }

  /* ── Valores zero ────────────────────────────────────────── */
  .val-zero { color: #999; }

  /* ── Valores com dado ────────────────────────────────────── */
  .val-bold { font-weight: bold; }

  /* ── Estoque tables ──────────────────────────────────────── */
  .estoque-table th {
    font-size: 7.5pt;
    padding: 2px 4px;
    font-weight: bold;
  }
  .estoque-table td {
    font-weight: bold;
    font-size: 9pt;
    padding: 3px 4px;
  }

  /* ── Grade de detalhamentos ──────────────────────────────── */
  .details-grid {
    display: table;
    width: 100%;
    border-spacing: 6px 0;
    margin-top: 6px;
  }
  .details-col {
    display: table-cell;
    vertical-align: top;
  }
  .details-col table { font-size: 7.5pt; }
  .details-col table th {
    font-size: 7pt;
    padding: 2px 3px;
    background: #f0f0f0;
  }
  .details-col table td {
    font-size: 7.5pt;
    padding: 2px 3px;
  }

  /* ── Seção título para detalhamentos ─────────────────────── */
  .detail-section-title {
    font-weight: bold;
    font-size: 8pt;
    text-align: center;
    background: #f0f0f0;
    padding: 2px 4px;
    border: 1px solid #000;
  }

  /* ── Agrupadores (BEZERROS, DESCARTES) ───────────────────── */
  .group-label {
    font-weight: bold;
    font-size: 7pt;
    font-style: italic;
    text-align: left;
    padding-left: 2px;
    border: none;
    background: none;
  }
  .group-label td {
    border: none;
    padding: 0;
  }

  /* ── Badge de fazenda ────────────────────────────────────── */
  .farm-badge {
    display: inline-block;
    border: 1px solid #000;
    padding: 1px 5px;
    font-size: 7.5pt;
    font-weight: bold;
    margin: 1px;
  }

  /* ── Quebra de página ────────────────────────────────────── */
  .page-break { page-break-before: always; }

  /* ── Rodapé ──────────────────────────────────────────────── */
  .report-footer {
    margin-top: 5px;
    padding-top: 3px;
    border-top: 1px solid #999;
    font-size: 7pt;
    color: #666;
    display: table;
    width: 100%;
  }
  .footer-left  { display: table-cell; text-align: left; }
  .footer-right { display: table-cell; text-align: right; }
</style>
</head>
<body>

<div id="page-wrapper">
  {% block content %}{% endblock %}
</div>

<script>
(function () {
  var MM     = 96 / 25.4;
  var availW = (297 - 20) * MM;
  var availH = (210 - 16) * MM;
  var wrapper = document.getElementById('page-wrapper');
  wrapper.style.zoom  = '1';
  wrapper.style.width = availW + 'px';
  requestAnimationFrame(function () {
    var contentH = wrapper.scrollHeight;
    var contentW = wrapper.scrollWidth;
    var zoomX = availW / (contentW || 1);
    var zoomY = availH / (contentH || 1);
    var zoom  = Math.min(zoomX, zoomY);
    zoom = Math.min(zoom, 1.55);
    zoom = Math.max(zoom, 0.48);
    if (Math.abs(zoom - 1) > 0.01) {
      wrapper.style.width = (availW / zoom) + 'px';
      wrapper.style.zoom  = zoom;
    }
  });
})();
</script>
</body>
</html>
