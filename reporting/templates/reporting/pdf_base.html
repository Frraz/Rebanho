<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Relatório{% endblock %}</title>
<style>
  /* ══════════════════════════════════════════════════════════════
     ESTILO P&B — SEM CORES, APENAS PRETO, BRANCO E CINZA
  ══════════════════════════════════════════════════════════════ */
  :root {
    --black:        #000000;
    --text-main:    #0f172a;
    --text-muted:   #4b5563;
    --gray-header:  #e5e7eb;   /* fundo cabeçalhos */
    --gray-alt:     #f9fafb;   /* zebra linhas pares */
    --gray-total:   #e5e7eb;   /* fundo linha TOTAL */
    --border:       #9ca3af;   /* borda padrão */
    --border-strong:#374151;   /* borda espessa */
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 8pt;
    color: var(--text-main);
    background: white;
    line-height: 1.4;
    overflow: hidden;
  }

  @page {
    size: A4 landscape;
    margin: 0.7cm 1cm;
  }

  #page-wrapper { width: 100%; }

  /* ── Cabeçalho do relatório ──────────────────────────────────── */
  .report-header {
    text-align: center;
    margin-bottom: 6px;
    padding-bottom: 5px;
    border-bottom: 2px solid var(--black);
  }
  .report-title {
    font-size: 12pt;
    font-weight: bold;
    color: var(--black);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .report-subtitle {
    font-size: 9pt;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ── Seções ──────────────────────────────────────────────────── */
  .section { margin-bottom: 6px; }

  .section-title {
    font-size: 7pt;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 5px;
    margin-bottom: 3px;
    border-radius: 2px;
    /* P&B: fundo cinza claro, texto preto, borda esquerda preta */
    color:       var(--black);
    background:  var(--gray-header);
    border-left: 3px solid var(--black);
  }
  /* mantemos as classes para não quebrar templates existentes */
  .section-title.red   { color: var(--black); background: var(--gray-header); border-left: 3px solid var(--black); }
  .section-title.blue  { color: var(--black); background: var(--gray-header); border-left: 3px solid var(--black); }
  .section-title.green { color: var(--black); background: var(--gray-header); border-left: 3px solid var(--black); }
  .section-title.gray  { color: var(--black); background: var(--gray-header); border-left: 3px solid var(--border-strong); }

  /* ── Tabelas ─────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; font-size: 7.5pt; }

  th, td { border: 1px solid var(--border); padding: 3px 4px; }

  th {
    background:     var(--gray-header);
    font-weight:    bold;
    text-align:     center;
    font-size:      6.5pt;
    text-transform: uppercase;
    color:          var(--black);
  }
  td { text-align: center; color: var(--text-main); }
  td.text-left { text-align: left; }

  /* ── Grupos de colunas — P&B uniforme ───────────────────────── */
  .th-ocorrencias,
  .th-movimentos,
  .th-consolidado {
    background:    var(--gray-header) !important;
    color:         var(--black)       !important;
    border-bottom: 2px solid var(--black) !important;
  }

  /* ── Valores semânticos — todos pretos ──────────────────────── */
  .val-morte   { color: var(--text-main); font-weight: 600; }
  .val-venda   { color: var(--text-main); font-weight: 600; }
  .val-abate   { color: var(--text-main); font-weight: 600; }
  .val-nasc    { color: var(--text-main); font-weight: 600; }
  .val-entrada { color: var(--text-main); font-weight: bold; }
  .val-saida   { color: var(--text-main); font-weight: bold; }
  .val-zero    { color: #9ca3af; }   /* cinza suave para zeros */

  /* ── Linha de totais ─────────────────────────────────────────── */
  tr.total-row td {
    background:  var(--gray-total) !important;
    font-weight: bold;
    border-top:  2px solid var(--border-strong);
    padding:     4px 4px;
  }

  /* ── Tabelas de estoque ──────────────────────────────────────── */
  .estoque-table th { background: var(--gray-header); color: var(--black); }
  .estoque-table td { font-weight: bold; font-size: 8.5pt; padding: 5px 4px; }
  .estoque-total    { background: var(--gray-total) !important; font-size: 9pt; font-weight: bold; }

  /* ── Zebra nas linhas de dados ───────────────────────────────── */
  tbody tr:nth-child(even) td { background-color: var(--gray-alt); }
  tr.total-row td             { background: var(--gray-total) !important; }

  /* ── Grade de detalhamentos ──────────────────────────────────── */
  .details-grid {
    display: table;
    width: 100%;
    border-spacing: 4px 0;
    margin-bottom: 4px;
  }
  .details-col {
    display: table-cell;
    width: 33.33%;
    vertical-align: top;
    padding-right: 4px;
  }
  .details-col:last-child { padding-right: 0; }
  .details-col table th   { font-size: 6.5pt; }
  .details-col table td   { font-size: 7pt; }

  /* ── Tabela de vendas ────────────────────────────────────────── */
  .vendas-table    { width: 100%; margin-top: 3px; }
  .vendas-table th { font-size: 6.5pt; }
  .vendas-table td { font-size: 7pt; }

  /* ── Rodapé ──────────────────────────────────────────────────── */
  .report-footer {
    margin-top:  5px;
    padding-top: 3px;
    border-top:  1px solid var(--border);
    font-size:   6.5pt;
    color:       var(--text-muted);
    display:     table;
    width:       100%;
  }
  .footer-left  { display: table-cell; text-align: left; }
  .footer-right { display: table-cell; text-align: right; }

  /* ── Quebra de página ────────────────────────────────────────── */
  .page-break { page-break-before: always; }

  /* ── Badge de fazenda — P&B ──────────────────────────────────── */
  .farm-badge {
    background:    var(--gray-alt);
    border:        1px solid var(--border);
    border-radius: 3px;
    padding:       1px 5px;
    font-size:     7pt;
    color:         var(--black);
    display:       inline-block;
    margin:        1px;
  }
</style>
</head>
<body>

<div id="page-wrapper">
  {% block content %}{% endblock %}
</div>

<script>
(function () {
  var MM     = 96 / 25.4;
  var availW = (297 - 20) * MM;
  var availH = (210 - 14) * MM;
  var wrapper = document.getElementById('page-wrapper');
  wrapper.style.zoom  = '1';
  wrapper.style.width = availW + 'px';
  requestAnimationFrame(function () {
    var contentH = wrapper.scrollHeight;
    var contentW = wrapper.scrollWidth;
    var zoomX = availW / (contentW || 1);
    var zoomY = availH / (contentH || 1);
    var zoom  = Math.min(zoomX, zoomY);
    zoom = Math.min(zoom, 1.55);
    zoom = Math.max(zoom, 0.48);
    if (Math.abs(zoom - 1) > 0.01) {
      wrapper.style.width = (availW / zoom) + 'px';
      wrapper.style.zoom  = zoom;
    }
  });
})();
</script>
</body>
</html>
