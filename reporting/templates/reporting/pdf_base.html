<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Relatório{% endblock %}</title>
<style>
  /* ── Redefinição e base ──────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 8pt;
    color: #1a1a1a;
    background: white;
    line-height: 1.4;
    overflow: hidden;
  }

  /* ── Configuração da página ──────────────────────────────────── */
  @page {
    size: A4 landscape;
    margin: 0.7cm 1cm;
  }

  #page-wrapper {
    width: 100%;
  }

  /* ── Cabeçalho do relatório ──────────────────────────────────── */
  .report-header {
    text-align: center;
    margin-bottom: 6px;
    padding-bottom: 5px;
    border-bottom: 2px solid #166534;
  }
  .report-title {
    font-size: 12pt;
    font-weight: bold;
    color: #166534;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .report-subtitle {
    font-size: 9pt;
    color: #374151;
    margin-top: 2px;
  }
  .report-meta {
    font-size: 7pt;
    color: #6b7280;
    margin-top: 1px;
  }

  /* ── Seções ──────────────────────────────────────────────────── */
  .section {
    margin-bottom: 6px;
  }
  .section-title {
    font-size: 7pt;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 5px;
    margin-bottom: 3px;
    border-radius: 2px;
  }
  /* Variantes de cor para os títulos de seção */
  .section-title.red   { color: #dc2626; background: #fef2f2; border-left: 3px solid #dc2626; }
  .section-title.blue  { color: #1d4ed8; background: #eff6ff; border-left: 3px solid #1d4ed8; }
  .section-title.green { color: #16a34a; background: #f0fdf4; border-left: 3px solid #16a34a; }
  .section-title.gray  { color: #374151; background: #f9fafb; border-left: 3px solid #9ca3af; }

  /* ── Tabelas ─────────────────────────────────────────────────── */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 7.5pt;
  }
  th, td {
    border: 1px solid #d1d5db;
    padding: 4px 4px;
  }
  th {
    background: #f3f4f6;
    font-weight: bold;
    text-align: center;
    font-size: 6.5pt;
    text-transform: uppercase;
    color: #374151;
  }
  td { text-align: center; }
  td.text-left { text-align: left; }

  /* ── Cores dos grupos de colunas da tabela principal ─────────── */
  .th-ocorrencias { background: #fef2f2 !important; color: #dc2626 !important; }
  .th-movimentos  { background: #f0fdf4 !important; color: #16a34a !important; }
  .th-consolidado { background: #eff6ff !important; color: #1d4ed8 !important; }

  /* ── Cores semânticas dos valores ────────────────────────────── */
  .val-morte   { color: #dc2626; font-weight: 600; }
  .val-venda   { color: #d97706; font-weight: 600; }
  .val-abate   { color: #6b7280; font-weight: 600; }
  .val-nasc    { color: #16a34a; font-weight: 600; }
  .val-entrada { color: #16a34a; font-weight: bold; background: #f0fdf4; }
  .val-saida   { color: #dc2626; font-weight: bold; background: #fef2f2; }
  .val-zero    { color: #d1d5db; }

  /* ── Linha de totais ─────────────────────────────────────────── */
  tr.total-row td {
    background: #f3f4f6;
    font-weight: bold;
    border-top: 2px solid #9ca3af;
    padding: 5px 4px;
  }

  /* ── Tabelas de estoque (inicial e final) ────────────────────── */
  .estoque-table th { background: #f0fdf4; color: #166534; }
  .estoque-table td { font-weight: bold; font-size: 8.5pt; padding: 5px 4px; }
  .estoque-total    { background: #dcfce7 !important; color: #166534; font-size: 9pt; }

  /* ── Grade de detalhamentos — linha superior (3 colunas) ─────── */
  .details-grid {
    display: table;
    width: 100%;
    border-spacing: 4px 0;
    margin-bottom: 4px;
  }
  .details-col {
    display: table-cell;
    width: 33.33%;
    vertical-align: top;
    padding-right: 4px;
  }
  .details-col:last-child { padding-right: 0; }
  .details-col table th { font-size: 6.5pt; }
  .details-col table td { font-size: 7pt; }

  /* ── Tabela de vendas — linha inferior (largura total) ───────── */
  .vendas-table {
    width: 100%;
    margin-top: 3px;
  }
  .vendas-table th { font-size: 6.5pt; }
  .vendas-table td { font-size: 7pt; }

  /* ── Rodapé do documento ─────────────────────────────────────── */
  .report-footer {
    margin-top: 5px;
    padding-top: 3px;
    border-top: 1px solid #e5e7eb;
    font-size: 6.5pt;
    color: #9ca3af;
    display: table;
    width: 100%;
  }
  .footer-left  { display: table-cell; text-align: left; }
  .footer-right { display: table-cell; text-align: right; }

  /* ── Quebra de página manual ─────────────────────────────────── */
  .page-break { page-break-before: always; }

  /* ── Etiqueta de fazenda (usada no Fazendas Reunidas) ─────── */
  .farm-badge {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 7pt;
    color: #166534;
    display: inline-block;
    margin: 1px;
  }
</style>
</head>
<body>

<div id="page-wrapper">
  {% block content %}{% endblock %}
</div>

<script>
(function () {
  var MM   = 96 / 25.4;
  var availW = (297 - 20) * MM;
  var availH = (210 - 14) * MM;

  var wrapper = document.getElementById('page-wrapper');

  wrapper.style.zoom  = '1';
  wrapper.style.width = availW + 'px';

  requestAnimationFrame(function () {
    var contentH = wrapper.scrollHeight;
    var contentW = wrapper.scrollWidth;

    var zoomX = availW / (contentW || 1);
    var zoomY = availH / (contentH || 1);
    var zoom  = Math.min(zoomX, zoomY);

    zoom = Math.min(zoom, 1.55);
    zoom = Math.max(zoom, 0.48);

    if (Math.abs(zoom - 1) > 0.01) {
      wrapper.style.width = (availW / zoom) + 'px';
      wrapper.style.zoom  = zoom;
    }
  });
})();
</script>

</body>
</html>
