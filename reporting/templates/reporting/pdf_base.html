<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Relatório{% endblock %}</title>
<style>
  /* ══════════════════════════════════════════════════════════════
     PALETA CORPORATIVA — Azul · Cinza Escuro · Vermelho
  ══════════════════════════════════════════════════════════════ */
  :root {
    /* Azul corporativo vivo — imprime bem, leitura clara */
    --blue-corp-dark:   #1a4fa3;   /* textos, títulos */
    --blue-corp-mid:    #2563eb;   /* badges, bordas */
    --blue-corp-light:  #dbeafe;   /* fundos suaves */
    --blue-corp-total:  #bfdbfe;   /* fundo célula total */

    /* Vermelho controlado */
    --red-dark:         #b91c1c;   /* textos vermelhos */
    --red-light:        #fee2e2;   /* fundos vermelhos suaves */

    /* Cinza escuro — subtítulos, consolidado */
    --slate-dark:       #1e293b;
    --slate-mid:        #475569;
    --slate-light:      #f1f5f9;
    --slate-total:      #e2e8f0;

    /* Neutros */
    --border:           #cbd5e1;
    --border-strong:    #475569;
    --header-bg:        #f1f5f9;
    --row-alt:          #f8fafc;
    --text-main:        #0f172a;
    --text-muted:       #64748b;
    --gray-light:       #f1f5f9;
    --gray-border:      #94a3b8;   /* zeros / valores ausentes */
  }

  /* ── Redefinição e base ──────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 8pt;
    color: var(--text-main);
    background: white;
    line-height: 1.4;
    overflow: hidden;
  }

  /* ── Configuração da página ──────────────────────────────────── */
  @page {
    size: A4 landscape;
    margin: 0.7cm 1cm;
  }

  #page-wrapper { width: 100%; }

  /* ── Cabeçalho do relatório ──────────────────────────────────── */
  .report-header {
    text-align: center;
    margin-bottom: 6px;
    padding-bottom: 5px;
    border-bottom: 2px solid var(--blue-corp-dark);
  }
  .report-title {
    font-size: 12pt;
    font-weight: bold;
    color: var(--blue-corp-dark);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .report-subtitle {
    font-size: 9pt;
    color: var(--slate-mid);
    margin-top: 2px;
  }
  .report-meta {
    font-size: 7pt;
    color: var(--text-muted);
    margin-top: 1px;
  }

  /* ── Seções ──────────────────────────────────────────────────── */
  .section { margin-bottom: 6px; }

  .section-title {
    font-size: 7pt;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 5px;
    margin-bottom: 3px;
    border-radius: 2px;
  }
  /* red   → vermelho (ocorrências)                       */
  /* blue  → azul corporativo (tabela principal)          */
  /* green → azul corporativo (estoque final, moviment.) */
  /* gray  → cinza escuro (detalhamentos)                */
  .section-title.red   { color: var(--red-dark);        background: var(--red-light);        border-left: 3px solid var(--red-dark);       }
  .section-title.blue  { color: var(--blue-corp-dark);  background: var(--blue-corp-light);  border-left: 3px solid var(--blue-corp-dark); }
  .section-title.green { color: var(--blue-corp-dark);  background: var(--blue-corp-light);  border-left: 3px solid var(--blue-corp-mid);  }
  .section-title.gray  { color: var(--slate-dark);      background: var(--slate-light);      border-left: 3px solid var(--slate-mid);      }

  /* ── Tabelas ─────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; font-size: 7.5pt; }

  th, td { border: 1px solid var(--border); padding: 4px 4px; }

  th {
    background: var(--header-bg);
    font-weight: bold;
    text-align: center;
    font-size: 6.5pt;
    text-transform: uppercase;
    color: var(--slate-dark);
  }
  td { text-align: center; }
  td.text-left { text-align: left; }

  /* ── Grupos de colunas ───────────────────────────────────────── */
  /* Ocorrências → vermelho */
  .th-ocorrencias {
    background:    var(--red-light)       !important;
    color:         var(--red-dark)        !important;
    border-bottom: 2px solid var(--red-dark) !important;
  }
  /* Movimentações → azul corporativo */
  .th-movimentos {
    background:    var(--blue-corp-light) !important;
    color:         var(--blue-corp-dark)  !important;
    border-bottom: 2px solid var(--blue-corp-dark) !important;
  }
  /* Consolidado → cinza escuro */
  .th-consolidado {
    background:    var(--slate-light)     !important;
    color:         var(--slate-dark)      !important;
    border-bottom: 2px solid var(--slate-mid) !important;
  }

  /* ── Valores semânticos ──────────────────────────────────────── */
  /* Ocorrências — vermelho */
  .val-morte   { color: var(--red-dark);       font-weight: 600; }
  .val-venda   { color: var(--red-dark);       font-weight: 600; }
  .val-abate   { color: var(--red-dark);       font-weight: 600; }
  /* Movimentações — azul */
  .val-nasc    { color: var(--blue-corp-dark); font-weight: 600; }
  /* Consolidado — preto neutro, sem fundo colorido */
  .val-entrada { color: var(--text-main);      font-weight: bold; }
  .val-saida   { color: var(--text-main);      font-weight: bold; }
  /* Zeros / valores ausentes — cinza suave, sem peso visual */
  .val-zero    { color: var(--gray-border); }

  /* ── Linha de totais ─────────────────────────────────────────── */
  tr.total-row td {
    background:  var(--header-bg);
    font-weight: bold;
    border-top:  2px solid var(--border-strong);
    padding:     5px 4px;
  }

  /* ── Tabelas de estoque ──────────────────────────────────────── */
  .estoque-table th { background: var(--blue-corp-light); color: var(--blue-corp-dark); }
  .estoque-table td { font-weight: bold; font-size: 8.5pt; padding: 5px 4px; }
  .estoque-total    { background: var(--blue-corp-total) !important; color: var(--blue-corp-dark); font-size: 9pt; }

  /* ── Grade de detalhamentos ──────────────────────────────────── */
  .details-grid {
    display: table;
    width: 100%;
    border-spacing: 4px 0;
    margin-bottom: 4px;
  }
  .details-col {
    display: table-cell;
    width: 33.33%;
    vertical-align: top;
    padding-right: 4px;
  }
  .details-col:last-child { padding-right: 0; }
  .details-col table th   { font-size: 6.5pt; }
  .details-col table td   { font-size: 7pt; }

  /* ── Tabela de vendas ────────────────────────────────────────── */
  .vendas-table          { width: 100%; margin-top: 3px; }
  .vendas-table th       { font-size: 6.5pt; }
  .vendas-table td       { font-size: 7pt; }

  /* ── Zebra nas linhas de dados ───────────────────────────────── */
  tbody tr:nth-child(even) td { background-color: var(--row-alt); }
  tr.total-row td             { background: var(--header-bg) !important; }

  /* ── Rodapé ──────────────────────────────────────────────────── */
  .report-footer {
    margin-top:   5px;
    padding-top:  3px;
    border-top:   1px solid var(--border);
    font-size:    6.5pt;
    color:        var(--text-muted);
    display:      table;
    width:        100%;
  }
  .footer-left  { display: table-cell; text-align: left; }
  .footer-right { display: table-cell; text-align: right; }

  /* ── Quebra de página ────────────────────────────────────────── */
  .page-break { page-break-before: always; }

  /* ── Badge de fazenda ────────────────────────────────────────── */
  .farm-badge {
    background:    var(--blue-corp-light);
    border:        1px solid var(--blue-corp-mid);
    border-radius: 3px;
    padding:       1px 5px;
    font-size:     7pt;
    color:         var(--blue-corp-dark);
    display:       inline-block;
    margin:        1px;
  }
</style>
</head>
<body>

<div id="page-wrapper">
  {% block content %}{% endblock %}
</div>

<script>
(function () {
  var MM     = 96 / 25.4;
  var availW = (297 - 20) * MM;
  var availH = (210 - 14) * MM;
  var wrapper = document.getElementById('page-wrapper');
  wrapper.style.zoom  = '1';
  wrapper.style.width = availW + 'px';
  requestAnimationFrame(function () {
    var contentH = wrapper.scrollHeight;
    var contentW = wrapper.scrollWidth;
    var zoomX = availW / (contentW || 1);
    var zoomY = availH / (contentH || 1);
    var zoom  = Math.min(zoomX, zoomY);
    zoom = Math.min(zoom, 1.55);
    zoom = Math.max(zoom, 0.48);
    if (Math.abs(zoom - 1) > 0.01) {
      wrapper.style.width = (availW / zoom) + 'px';
      wrapper.style.zoom  = zoom;
    }
  });
})();
</script>
</body>
</html>
