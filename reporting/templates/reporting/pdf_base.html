<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Relatório{% endblock %}</title>
<style>
  /* ── Redefinição e base ──────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 7.5pt;
    color: #1a1a1a;
    background: white;
    line-height: 1.2;
    /* overflow:hidden impede que o espaço abaixo do conteúdo
       gere páginas extras no PDF */
    overflow: hidden;
  }

  /* ── Configuração da página ──────────────────────────────────── */
  @page {
    size: A4 landscape;
    margin: 0.7cm 1cm;
  }

  /*
   * #page-wrapper recebe zoom via JavaScript.
   * zoom (diferente de transform:scale) redimensiona o elemento
   * E o espaço que ele ocupa no fluxo, eliminando a margem inferior.
   */
  #page-wrapper {
    width: 100%;
  }

  /* ── Cabeçalho do relatório ──────────────────────────────────── */
  .report-header {
    text-align: center;
    margin-bottom: 5px;
    padding-bottom: 4px;
    border-bottom: 2px solid #166534;
  }
  .report-title {
    font-size: 11pt;
    font-weight: bold;
    color: #166534;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .report-subtitle {
    font-size: 8.5pt;
    color: #374151;
    margin-top: 1px;
  }
  .report-meta {
    font-size: 6.5pt;
    color: #6b7280;
    margin-top: 1px;
  }

  /* ── Seções ──────────────────────────────────────────────────── */
  .section {
    margin-bottom: 5px;
  }
  .section-title {
    font-size: 6.5pt;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 5px;
    margin-bottom: 2px;
    border-radius: 2px;
  }
  /* Variantes de cor para os títulos de seção */
  .section-title.red   { color: #dc2626; background: #fef2f2; border-left: 3px solid #dc2626; }
  .section-title.blue  { color: #1d4ed8; background: #eff6ff; border-left: 3px solid #1d4ed8; }
  .section-title.green { color: #16a34a; background: #f0fdf4; border-left: 3px solid #16a34a; }
  .section-title.gray  { color: #374151; background: #f9fafb; border-left: 3px solid #9ca3af; }

  /* ── Tabelas ─────────────────────────────────────────────────── */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 6.5pt;
  }
  th, td {
    border: 1px solid #d1d5db;
    padding: 2px 3px;
  }
  th {
    background: #f3f4f6;
    font-weight: bold;
    text-align: center;
    font-size: 6pt;
    text-transform: uppercase;
    color: #374151;
  }
  td { text-align: center; }
  td.text-left { text-align: left; }

  /* ── Cores dos grupos de colunas da tabela principal ─────────── */
  .th-ocorrencias { background: #fef2f2 !important; color: #dc2626 !important; }
  .th-movimentos  { background: #f0fdf4 !important; color: #16a34a !important; }
  .th-consolidado { background: #eff6ff !important; color: #1d4ed8 !important; }

  /* ── Cores semânticas dos valores ────────────────────────────── */
  .val-morte   { color: #dc2626; font-weight: 600; }   /* vermelho — baixa */
  .val-venda   { color: #d97706; font-weight: 600; }   /* âmbar   — saída comercial */
  .val-abate   { color: #6b7280; font-weight: 600; }   /* cinza   — abate */
  .val-nasc    { color: #16a34a; font-weight: 600; }   /* verde   — entrada/nascimento */
  .val-entrada { color: #16a34a; font-weight: bold; background: #f0fdf4; } /* consolidado — entrada */
  .val-saida   { color: #dc2626; font-weight: bold; background: #fef2f2; } /* consolidado — saída */
  .val-zero    { color: #d1d5db; }                     /* cinza claro — sem movimento */

  /* ── Linha de totais ─────────────────────────────────────────── */
  tr.total-row td {
    background: #f3f4f6;
    font-weight: bold;
    border-top: 2px solid #9ca3af;
  }

  /* ── Tabelas de estoque (inicial e final) ────────────────────── */
  .estoque-table th { background: #f0fdf4; color: #166534; }
  .estoque-table td { font-weight: bold; font-size: 8pt; }
  .estoque-total    { background: #dcfce7 !important; color: #166534; font-size: 8.5pt; }

  /* ── Grade de detalhamentos — linha superior (3 colunas) ─────── */
  .details-grid {
    display: table;
    width: 100%;
    border-spacing: 4px 0;
    margin-bottom: 4px; /* separa as 3 colunas da tabela de vendas abaixo */
  }
  .details-col {
    display: table-cell;
    width: 33.33%;
    vertical-align: top;
    padding-right: 4px;
  }
  .details-col:last-child { padding-right: 0; }
  .details-col table th { font-size: 6pt; }
  .details-col table td { font-size: 6.5pt; }

  /* ── Tabela de vendas — linha inferior (largura total) ───────── */
  .vendas-table {
    width: 100%;
    margin-top: 3px;
  }
  .vendas-table th { font-size: 6pt; }
  .vendas-table td { font-size: 6.5pt; }

  /* ── Rodapé do documento ─────────────────────────────────────── */
  .report-footer {
    margin-top: 5px;
    padding-top: 3px;
    border-top: 1px solid #e5e7eb;
    font-size: 6pt;
    color: #9ca3af;
    display: table;
    width: 100%;
  }
  .footer-left  { display: table-cell; text-align: left; }
  .footer-right { display: table-cell; text-align: right; }

  /* ── Quebra de página manual ─────────────────────────────────── */
  .page-break { page-break-before: always; }

  /* ── Etiqueta de fazenda (usada no relatório consolidado) ─────── */
  .farm-badge {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 6.5pt;
    color: #166534;
    display: inline-block;
    margin: 1px;
  }
</style>
</head>
<body>

<div id="page-wrapper">
  {% block content %}{% endblock %}
</div>

<script>
/*
 * Auto-escala com zoom (em vez de transform:scale).
 *
 * Por que zoom e não transform:scale?
 *   transform:scale() escala visualmente mas NÃO altera o espaço
 *   que o elemento ocupa no fluxo — por isso sobra margem branca abaixo.
 *   zoom redimensiona o elemento E seu espaço ocupado, eliminando
 *   completamente a margem inferior vazia.
 *
 * Dimensões da área útil — A4 paisagem, margem 0.7cm × 1cm:
 *   Largura útil = 297mm − 2×10mm = 277mm
 *   Altura útil  = 210mm − 2× 7mm = 196mm
 *
 * Cálculo do zoom:
 *   1. Medimos o conteúdo em zoom=1 (tamanho natural).
 *   2. zoomX = larguraUtil / larguraConteudo
 *      zoomY = alturaUtil  / alturaConteudo
 *      zoom  = min(zoomX, zoomY)   ← menor evita overflow
 *   3. Limitamos entre 0.48 e 1.55 para legibilidade.
 *   4. Aplicamos: wrapper.style.zoom = zoom
 *      O browser reajusta a altura do elemento automaticamente.
 *
 * Compatibilidade:
 *   - Chromium / wkhtmltopdf / Playwright → zoom funciona perfeitamente.
 *   - WeasyPrint não suporta zoom; nesse caso use a versão com
 *     transform:scale + height fixo (consulte comentário ao final).
 */
(function () {
  var MM   = 96 / 25.4;           /* fator de conversão mm → px a 96 dpi */
  var availW = (297 - 20) * MM;   /* 277mm em px ≈ 1047px */
  var availH = (210 - 14) * MM;   /* 196mm em px ≈  741px */

  var wrapper = document.getElementById('page-wrapper');

  /* ── Passo 1: garante zoom=1 e largura natural antes de medir ── */
  wrapper.style.zoom  = '1';
  wrapper.style.width = availW + 'px';

  /*
   * Aguarda um frame para que o browser termine o layout antes
   * de ler scrollHeight — evita leituras prematuras com altura 0.
   */
  requestAnimationFrame(function () {
    var contentH = wrapper.scrollHeight;
    var contentW = wrapper.scrollWidth;

    /* ── Passo 2: calcula o zoom ideal ─────────────────────────── */
    var zoomX = availW / (contentW || 1);
    var zoomY = availH / (contentH || 1);
    var zoom  = Math.min(zoomX, zoomY);

    /* ── Passo 3: limites de legibilidade ───────────────────────── */
    zoom = Math.min(zoom, 1.55);   /* máximo: 155% — evita fontes gigantes */
    zoom = Math.max(zoom, 0.48);   /* mínimo:  48% — abaixo fica ilegível  */

    /* ── Passo 4: aplica zoom apenas se diferença > 1% ─────────── */
    if (Math.abs(zoom - 1) > 0.01) {
      /*
       * Com zoom aplicado, a largura lógica deve ser redefinida para
       * que as tabelas (width:100%) continuem ocupando toda a linha.
       * A largura lógica = largura física / zoom.
       */
      wrapper.style.width = (availW / zoom) + 'px';
      wrapper.style.zoom  = zoom;
    }
  });
})();
</script>

</body>
</html>
